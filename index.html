<script>
        // ====== CONEXIÓN CON GOOGLE SHEETS PARA MEDIDAS ======
        // Enlace de producción de Google Apps Script integrado
        const URL_GOOGLE_STORE = "https://script.google.com/macros/s/AKfycbxIwl9OzqBML9pROQXjGqPZF1a562emYdDSx5p1wp9b2bZh3kqJJ42rWnXnL4Lw7v3o/exec";

        async function obtenerIdMedida(medidaTexto) {
            if (!medidaTexto || medidaTexto.trim() === "" || medidaTexto === "0") return "0";
            
            try {
                let response = await fetch(URL_GOOGLE_STORE, {
                    method: "POST",
                    mode: "cors",
                    body: JSON.stringify({ medida: medidaTexto.trim() })
                });
                
                let resultado = await response.json();
                
                if (resultado.status === "success") {
                    return resultado.id; // Retorna el ID numérico corto (1, 2, 3...)
                } else {
                    console.error("Error en Google Sheets:", resultado.message);
                    return medidaTexto; // Fallback por seguridad
                }
            } catch (error) {
                console.error("Error de conexión con la base de datos:", error);
                return medidaTexto; // Fallback por seguridad si no hay internet
            }
        }

        // LÓGICA DE NAVEGACIÓN
        function showView(viewId) {
            document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            
            document.getElementById(viewId).classList.add('active');
            
            if(viewId === 'home-view') document.getElementById('tab-home').classList.add('active');
            if(viewId === 'est-view') document.getElementById('tab-est').classList.add('active');
            if(viewId === 'dec-view') document.getElementById('tab-dec').classList.add('active');
        }

        // --- LÓGICA DEL ENTORNO DE GENERACIÓN ---
        let units = { ent: 'mm', sal: 'mm' };
        const dataRef = {
            FL: { conf: { "A": "REDONDOS", "B": "CUADRADOS", "C": "RECTANGULAR" }, ang: false, sal: false, jun: false },
            TU: { conf: null, ang: false, sal: false, jun: true },
            CE: { conf: { "A": "REDONDOS", "B": "CUADRADOS CON LINNER", "C": "CUADRADOS RADIO LARGO" }, ang: ["15","30","45","60","90"], sal: false, jun: true },
            CF: { conf: { "A": "FIJOS", "B": "AXIALES" }, ang: ["45","60"], sal: false, jun: true },
            CT: { conf: { "A": "REDONDO A REDONDO", "B": "RECTANGULAR A CUADRADO", "C": "CUADRADO A REDONDO", "D": "RECTANGULAR A REDONDO" }, ang: false, sal: true, jun: true }
        };
        const matEspMap = { "G15":"A", "G20":"B", "G27":"C", "G30":"D", "G46":"E", "I15":"F", "I20":"G", "I27":"H", "I30":"I", "I46":"J", "A15":"K", "A20":"L", "A27":"M", "A30":"N", "A46":"O" };
        const junMap = { "A":["FLANCHE","FLANCHE"], "B":["FLANCHE","PESTAÑA"], "C":["FLANCHE","LISO"], "D":["PESTAÑA","FLANCHE"], "E":["PESTAÑA","PESTAÑA"], "F":["PESTAÑA","LISO"], "G":["LISO","FLANCHE"], "H":["LISO","PESTAÑA"], "I":["LISO","LISO"] };

        function toggleUnit(field, unit) {
            units[field] = unit;
            document.getElementById(`${field}-mm`).classList.toggle('active', unit === 'mm');
            document.getElementById(`${field}-in`).classList.toggle('active', unit === 'in');
        }

        function actualizarInterfaz() {
            const fam = document.getElementById('familia').value, info = dataRef[fam];
            document.getElementById('table-conf-box').classList.toggle('hidden', !info.conf);
            document.getElementById('table-junta-box').classList.toggle('hidden', !info.jun);
            const divConf = document.getElementById('div-conf');
            if (info.conf) {
                divConf.classList.remove('hidden');
                const sel = document.getElementById('config');
                if (sel.getAttribute('data-fam') !== fam) {
                    sel.innerHTML = Object.entries(info.conf).map(([k,v]) => `<option value="${k}">${v}</option>`).join("");
                    sel.setAttribute('data-fam', fam);
                    document.querySelector('#table-conf tbody').innerHTML = Object.entries(info.conf).map(([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join("");
                }
            } else { divConf.classList.add('hidden'); }
            const conf = document.getElementById('config').value;
            let esRectEnt = false, esRectSal = false;
            if (fam === 'CT') {
                if (conf === 'B' || conf === 'D') esRectEnt = true;
            } else if (fam === 'FL') {
                if (conf === 'C') esRectEnt = true;
            }
            toggleDim('ent', esRectEnt);
            toggleDim('sal', esRectSal && info.sal);
            document.getElementById('div-salida').classList.toggle('hidden', !info.sal);
            const selAng = document.getElementById('angulo');
            if (info.ang) {
                document.getElementById('div-angulo').classList.remove('hidden');
                selAng.innerHTML = info.ang.map(a => `<option value="${a}">${a}°</option>`).join("");
            } else { document.getElementById('div-angulo').classList.add('hidden'); }
            document.getElementById('div-junta').classList.toggle('hidden', !info.jun);
            dibujarTablasMat();
        }

        function toggleDim(prefix, showSecond) {
            document.getElementById(`${prefix}2`).classList.toggle('hidden', !showSecond);
            document.querySelector(`#${prefix}-group .x-sep`).classList.toggle('hidden', !showSecond);
        }

        function dibujarTablasMat() {
            document.getElementById('table-mat').innerHTML = Object.entries(matEspMap).map(([k,v]) => `<tr><td>${v}</td><td>${k[0]=='G'?'GALVANIZADO':k[0]=='I'?'INOXIDABLE':'ACERO NEGRO'}</td><td>${k.slice(1)/10}</td></tr>`).join("");
            const tJun = document.getElementById('table-junta'), selJun = document.getElementById('junta');
            if (tJun.innerHTML === "") {
                tJun.innerHTML = Object.entries(junMap).map(([k,v]) => `<tr><td>${k}</td><td>${v[0]}</td><td>${v[1]}</td></tr>`).join("");
                selJun.innerHTML = Object.entries(junMap).map(([k,v]) => `<option value="${k}">${v[0]} - ${v[1]}</option>`).join("");
            }
        }

        function processVal(val, field) {
            let n = parseFloat(val) || 0;
            if (units[field] === 'in') n = Math.round(n * 25.4);
            return n;
        }

        // GENERADOR MODIFICADO: AHORA CONSULTA Y SINCROIZA CON TU GOOGLE SHEET
        async function generarCodigo() {
            document.getElementById('final-code-display').innerText = "PROCESANDO CON BASE DE DATOS...";
            
            const fam = document.getElementById('familia').value;
            const conf = document.getElementById('config').value;
            const me = matEspMap[document.getElementById('material').value + document.getElementById('espesor').value];
            const jun = document.getElementById('junta').value;
            const ang = document.getElementById('angulo').value;
            
            const getDim = (p) => {
                const v1 = processVal(document.getElementById(`${p}1`).value, p);
                const v2 = processVal(document.getElementById(`${p}2`).value, p);
                const isHidden = document.getElementById(`${p}2`).classList.contains('hidden');
                return (!isHidden && v2 > 0) ? `${v1}X${v2}` : `${v1}`;
            };
            
            const entOriginal = getDim('ent');
            const salOriginal = getDim('sal');
            
            // Enviamos las medidas originales al Google Sheet para que nos de sus ID equivalentes
            const ent = await obtenerIdMedida(entOriginal);
            const sal = await obtenerIdMedida(salOriginal);
            
            let letrasHead = fam;
            if (fam !== "TU") letrasHead += conf;
            letrasHead += me;
            if (fam !== "FL") letrasHead += jun;
            if (fam === "CE" || fam === "CF") letrasHead += ang;
            
            let res = "";
            if (fam === "CT") {
                res = `${letrasHead}${ent}-${sal}`;
            } else {
                res = `${letrasHead}${ent}`;
            }
            
            document.getElementById('final-code-display').innerText = res;
        }

        // --- CÓDIGO DEL MÓDULO DE DESGLOSE (DECODIFICADOR) ---
        const famMap = { "FL": "FLANCHES", "TU": "TUBOS", "CE": "CODOS", "CF": "FRENOS", "CT": "TRANSICIONES" };
        const confMapDec = {
            FL: { "A": "REDONDOS", "B": "CUADRADOS", "C": "RECTANGULAR" },
            CE: { "A": "REDONDOS", "B": "CUADRADOS CON LINNER", "C": "CUADRADOS RADIO LARGO" },
            CF: { "A": "FIJOS", "B": "AXIALES" },
            CT: { "A": "REDONDO A REDONDO", "B": "RECTANGULAR A CUADRADO", "C": "CUADRADO A REDONDO", "D": "RECTANGULAR A REDONDO" }
        };
        const matEspRev = {
            "A":"GALVANIZADO (1.5mm)", "B":"GALVANIZADO (2.0mm)", "C":"GALVANIZADO (2.7mm)", "D":"GALVANIZADO (3.0mm)", "E":"GALVANIZADO (4.6mm)",
            "F":"INOXIDABLE (1.5mm)", "G":"INOXIDABLE (2.0mm)", "H":"INOXIDABLE (2.7mm)", "I":"INOXIDABLE (3.0mm)", "J":"INOXIDABLE (4.6mm)",
            "K":"ACERO NEGRO (1.5mm)", "L":"ACERO NEGRO (2.0mm)", "M":"ACERO NEGRO (2.7mm)", "N":"ACERO NEGRO (3.0mm)", "O":"ACERO NEGRO (4.6mm)"
        };
        const junMapDec = {
            "A":"FLANCHE / FLANCHE", "B":"FLANCHE / PESTAÑA", "C":"FLANCHE / LISO",
            "D":"PESTAÑA / FLANCHE", "E":"PESTAÑA / PESTAÑA", "F":"PESTAÑA / LISO",
            "G":"LISO / FLANCHE", "H":"LISO / PESTAÑA", "I":"LISO / LISO"
        };

        function formatDimensionInches(text) {
            if (!text) return "";
            const subParts = text.split('X');
            const processedSubParts = subParts.map(valStr => {
                const num = parseFloat(valStr);
                if (isNaN(num)) return valStr;
                if (Math.abs(num - 197) <= 1) return `${num} mm (7-3/4 in)`;
                const rawInches = num / 25.4;
                const roundedInches = Math.round(rawInches);
                if (Math.abs(num - (roundedInches * 25.4)) <= 2.5 && roundedInches > 0) {
                    return `${num} mm (${roundedInches} in)`;
                } else {
                    return `${num} mm`;
                }
            });
            return processedSubParts.join(' X ');
        }

        function handleKeyPress(e) { if (e.key === 'Enter') decodificar(); }

        function decodificar() {
            const inputFull = document.getElementById('input-code').value.trim().toUpperCase();
            const errorMsg = document.getElementById('error-msg');
            const resBox = document.getElementById('result');
            errorMsg.innerText = "";
            resBox.style.display = "none";
            
            if (inputFull.length < 3) { errorMsg.innerText = "Código inválido."; return; }
            
            const fam = inputFull.substring(0, 2);
            if (!famMap[fam]) { errorMsg.innerText = "Familia no reconocida."; return; }
            
            document.getElementById('res-fam').innerText = famMap[fam];
            document.getElementById('row-conf').style.display = "none";
            document.getElementById('row-sal').style.display = "none";
            document.getElementById('row-ang').style.display = "none";
            document.getElementById('row-jun').style.display = "none";
            
            try {
                let charIdx = 2;
                let conf = "";
                if (fam !== "TU") {
                    conf = inputFull.charAt(charIdx++);
                    document.getElementById('res-conf').innerText = (confMapDec[fam] && confMapDec[fam][conf]) ? confMapDec[fam][conf] : "Desconocido";
                    document.getElementById('row-conf').style.display = "flex";
                }
                
                const meKey = inputFull.charAt(charIdx++);
                const meVal = matEspRev[meKey] || "Desconocido";
                document.getElementById('res-mat').innerText = meVal.split(' (')[0];
                document.getElementById('res-esp').innerText = meVal.includes('(') ? meVal.split('(')[1].replace(')', '') : "Desconocido";
                
                let jKey = "";
                if (fam !== "FL") {
                    jKey = inputFull.charAt(charIdx++);
                    document.getElementById('res-jun').innerText = junMapDec[jKey] || "Desconocido";
                    document.getElementById('row-jun').style.display = "flex";
                }
                
                if (fam === "CE" || fam === "CF") {
                    let angStr = "";
                    while (charIdx < inputFull.length && !isNaN(inputFull.charAt(charIdx))) {
                        angStr += inputFull.charAt(charIdx++);
                        if (angStr === "15" || angStr === "30" || angStr === "45" || angStr === "60" || angStr === "90") {
                            break;
                        }
                    }
                    document.getElementById('res-ang').innerText = angStr + "°";
                    document.getElementById('row-ang').style.display = "flex";
                }
                
                const parteNumericaFinal = inputFull.substring(charIdx);
                if (!parteNumericaFinal) { errorMsg.innerText = "Faltan las medidas numéricas."; return; }
                
                if (fam === "CT") {
                    const ctParts = parteNumericaFinal.split('-');
                    if (ctParts.length >= 2) {
                        document.getElementById('res-ent').innerText = formatDimensionInches(ctParts[0]);
                        document.getElementById('res-sal').innerText = formatDimensionInches(ctParts[1]);
                        document.getElementById('row-sal').style.display = "flex";
                    } else {
                        document.getElementById('res-ent').innerText = formatDimensionInches(parteNumericaFinal);
                    }
                } else {
                    document.getElementById('res-ent').innerText = formatDimensionInches(parteNumericaFinal);
                }
                
                resBox.style.display = "block";
            } catch (e) { 
                errorMsg.innerText = "Error al procesar el formato continuo del código."; 
            }
        }

        // Ejecución segura de interfaz tras cargar los elementos del DOM
        window.onload = function() {
            actualizarInterfaz();
        };
    </script>
